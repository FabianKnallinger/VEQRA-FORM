name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Entwicklungsabhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Icons erzeugen
        run: python tools/generate_icons.py

      - name: Tests ausfuehren
        run: python -m pytest

      - name: Lint-Pruefung ausfuehren
        run: python -m ruff check PythonPartsScripts tests tools
